<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数学マスター Ver 2.0.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:radial-gradient(circle,#111,#000);
  color:white;
  text-align:center;
  font-family:sans-serif;
  min-height:100vh;
  padding-bottom:180px;
}
h1{color:#00ffcc;text-shadow:0 0 10px #00ffcc}
.screen{display:none}.active{display:block}
.modeBtn{display:block;width:84%;max-width:520px;margin:14px auto;font-size:26px;padding:16px}
button{
  font-size:22px;
  margin:8px;
  padding:10px 18px;
  background:#00ffcc;
  border:none;
  border-radius:10px;
}
button:hover{transform:scale(1.04);box-shadow:0 0 18px #00ffcc}
input{
  font-size:28px;
  width:84%;
  max-width:560px;
  text-align:center;
  border-radius:15px;
  padding:12px;
  border:none;
  margin:8px;
}
a{color:#00ffcc}

#profileIcon{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  background:#333;
  border:2px solid #00ffcc;
}
#currentTitle,#levelInfo,#rateInfo,#coinInfo{
  font-size:20px;
  margin:7px;
}
.founderTitle{color:#FFD700;font-weight:bold;animation:founderGlow 2s infinite}
.meneruTitle{color:#ff0000;font-weight:bold;text-shadow:0 0 10px #ff0000,0 0 20px #ff0000,0 0 40px #ff0000}
.nakanakaTitle{color:#00aaff;font-weight:bold;text-shadow:0 0 5px #00aaff,0 0 10px #00aaff,0 0 20px #00aaff}
.urTitle{font-weight:bold;text-shadow:0 0 12px currentColor,0 0 24px currentColor}
.rainbowTitle{
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
  -webkit-background-clip:text;
  color:transparent;
}
@keyframes founderGlow{
  0%{text-shadow:0 0 5px gold,0 0 10px gold}
  50%{text-shadow:0 0 20px gold,0 0 40px gold}
  100%{text-shadow:0 0 5px gold,0 0 10px gold}
}
.levelUp{
  position:fixed;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:56px;
  color:#FFD700;
  text-shadow:0 0 30px gold;
  z-index:1000;
  animation:levelPop 1.4s forwards;
}
@keyframes levelPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2)}
}
#enemy,#player,#scoreStatus{font-size:28px;margin:10px}
.hpFrame{
  width:84%;
  height:24px;
  background:#333;
  margin:10px auto 24px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 10px white;
}
.hpBar{height:100%;width:100%;transition:width .4s}
#enemyBar{background:linear-gradient(90deg,red,orange)}
#playerBar{background:linear-gradient(90deg,lime,#00ffcc)}
#q{font-size:38px;margin:24px 8px;text-shadow:0 0 20px #00ffcc;word-break:break-word}
.questionAnim{animation:questionPop .5s}
@keyframes questionPop{
  0%{opacity:0;transform:scale(.5) rotate(-3deg)}
  70%{opacity:1;transform:scale(1.08) rotate(2deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
#goText{
  position:fixed;
  top:35%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:86px;
  color:#00ffcc;
  text-shadow:0 0 30px #00ffcc;
  opacity:0;
  pointer-events:none;
  z-index:50;
}
.goAnim{animation:goPop .7s}
@keyframes goPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  35%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2)}
}
.rankItem,.titleItem,.profileItem,.settingsItem,.missionItem,.reviewItem,.achievementItem,.friendItem,.guideItem,.stampItem{
  background:rgba(255,255,255,.12);
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  width:90%;
  max-width:760px;
  text-align:left;
  font-size:18px;
}
.rankIcon{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  vertical-align:middle;
  margin-right:8px;
}
#customKeyboard{
  width:94%;
  max-width:620px;
  margin:10px auto 15px;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:7px;
}
.keyBtn{
  font-size:20px;
  padding:12px 2px;
  margin:0;
  border-radius:12px;
  background:#222;
  color:white;
  border:1px solid #00ffcc;
  box-shadow:0 0 8px #00ffcc55;
}
.keyBtn.wide{grid-column:span 2}
.keyBtn.danger{background:#552222}
.keyBtn.ok{background:#006655}
.gachaAnim{
  font-size:42px;
  text-align:center;
  animation:gachaShake .15s infinite;
}
@keyframes gachaShake{
  0%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  100%{transform:translateX(0)}
}
.urFlash{animation:urFlashAnim 1s}
@keyframes urFlashAnim{
  0%{background:white}
  100%{background:radial-gradient(circle,#111,#000)}
}
.stampGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin:12px auto;
}
.stampCell{
  text-align:center;
  padding:12px 4px;
  border-radius:10px;
  background:#222;
  border:1px solid #555;
}
.stamped{
  background:#004d40;
  border-color:#00ffcc;
  animation:stampPop .55s;
}
@keyframes stampPop{
  0%{transform:scale(.2) rotate(-25deg);opacity:.2}
  60%{transform:scale(1.25) rotate(10deg);opacity:1}
  100%{transform:scale(1) rotate(0)}
}
#adArea{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  height:50px;
  background:white;
  color:black;
  border-radius:10px;
  line-height:50px;
  z-index:10;
}
#versionLabel{
  position:fixed;
  right:10px;
  bottom:78px;
  color:#aaa;
  font-size:12px;
  z-index:999;
}
</style>
</head>
<body>
<div id="homeScreen" class="screen active">
  <h1>🏆 数学マスター 🏆</h1>
  <img id="profileIcon" src="">
  <div id="currentTitle">称号：初心者</div>
  <div id="levelInfo">Lv1</div>
  <div id="rateInfo">正答率：0%</div>
  <div id="coinInfo">コイン：0</div>

  <button class="modeBtn" onclick="showStudyMenu()">📚 学習モード</button>
  <button class="modeBtn" onclick="selectRankingMode()">⚔️ ランキングモード</button>
  <button class="modeBtn" onclick="showGacha()">🎰 ガチャ</button>
  <button class="modeBtn" onclick="showGachaBook()">📖 ガチャ図鑑</button>
  <button class="modeBtn" onclick="showLoginCalendar()">📅 ログボカレンダー</button>
  <button class="modeBtn" onclick="showGuide()">📖 遊び方</button>
  <button class="modeBtn" onclick="showTitles()">🏅 称号一覧</button>
  <button class="modeBtn" onclick="showAchievements()">🏆 実績一覧</button>
  <button class="modeBtn" onclick="showWorldRanking()">🌍 週間ランキング</button>
  <button class="modeBtn" onclick="showFriendMenu()">🤝 フレンド</button>
  <button class="modeBtn" onclick="showDailyMission()">🎯 デイリーミッション</button>
  <button class="modeBtn" onclick="showReviewList()">📚 復習リスト</button>
  <button class="modeBtn" onclick="showProfile()">👤 プロフィール</button>
  <button class="modeBtn" onclick="showSettings()">⚙️ 設定</button>
  <button class="modeBtn" onclick="showContact()">📩 お問い合わせ</button>
  <div id="panelArea"></div>
</div>

<div id="gameScreen" class="screen">
  <h1 id="modeTitle">🏆 数学マスター 🏆</h1>
  <div id="scoreStatus"></div>
  <div id="enemy">👾 敵HP: <span id="ehp">10</span></div>
  <div class="hpFrame" id="enemyFrame"><div id="enemyBar" class="hpBar"></div></div>
  <div id="player">❤️ あなたHP: <span id="php">5</span></div>
  <div class="hpFrame" id="playerFrame"><div id="playerBar" class="hpBar"></div></div>
  <div id="goText">GO!</div>
  <div id="q">START</div>

  <input id="ans" placeholder="答え" inputmode="none" autocomplete="off">
  <div id="customKeyboard">
    <button class="keyBtn" onclick="addKey('7')">7</button>
    <button class="keyBtn" onclick="addKey('8')">8</button>
    <button class="keyBtn" onclick="addKey('9')">9</button>
    <button class="keyBtn" onclick="addKey('+')">+</button>
    <button class="keyBtn" onclick="addKey('*')">×</button>
    <button class="keyBtn" onclick="addKey('(')">(</button>

    <button class="keyBtn" onclick="addKey('4')">4</button>
    <button class="keyBtn" onclick="addKey('5')">5</button>
    <button class="keyBtn" onclick="addKey('6')">6</button>
    <button class="keyBtn" onclick="addKey('-')">-</button>
    <button class="keyBtn" onclick="addKey('/')">÷</button>
    <button class="keyBtn" onclick="addKey(')')">)</button>

    <button class="keyBtn" onclick="addKey('1')">1</button>
    <button class="keyBtn" onclick="addKey('2')">2</button>
    <button class="keyBtn" onclick="addKey('3')">3</button>
    <button class="keyBtn" onclick="addKey('^')">^</button>
    <button class="keyBtn" onclick="addKey('sqrt(')">√</button>
    <button class="keyBtn" onclick="addKey('x')">x</button>

    <button class="keyBtn" onclick="addKey('0')">0</button>
    <button class="keyBtn" onclick="addKey('/')">/</button>
    <button class="keyBtn" onclick="addKey('.')">.</button>
    <button class="keyBtn" onclick="addKey('sin(')">sin</button>
    <button class="keyBtn" onclick="addKey('cos(')">cos</button>
    <button class="keyBtn" onclick="addKey('tan(')">tan</button>

    <button class="keyBtn" onclick="addKey('e')">e</button>
    <button class="keyBtn" onclick="addKey('pi')">π</button>
    <button class="keyBtn danger" onclick="clearInput()">C</button>
    <button class="keyBtn danger" onclick="backspaceInput()">⌫</button>
    <button class="keyBtn ok wide" onclick="submit()">決定</button>
  </div>

  <button id="gameHomeBtn" onclick="backHome()">ホームへ</button>
  <div id="result"></div>
</div>

<div id="levelUpArea"></div>
<div id="adArea">広告スペース</div>
<div id="versionLabel">Ver 2.0.1</div>

<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="se_correct" src="correct.mp3"></audio>
<audio id="se_wrong" src="wrong.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVXvWTGetf41ajd0KDwNPG-dH8pmsMIt8",
  authDomain: "math-master-3c4df.firebaseapp.com",
  projectId: "math-master-3c4df",
  storageBucket: "math-master-3c4df.firebasestorage.app",
  messagingSenderId: "374039148607",
  appId: "1:374039148607:web:529bcba1879124436d208a",
  measurementId: "G-4YFNNNT6CK"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt:"select_account" });
window.currentUser = null;

onAuthStateChanged(auth,user=>{
  window.currentUser = user;
  if(window.refreshLoginStatus) window.refreshLoginStatus();
});

window.loginGoogle = async function(){
  try{
    const result = await signInWithPopup(auth,provider);
    window.currentUser = result.user;
    alert("Googleログイン成功：" + result.user.displayName);
    if(window.refreshLoginStatus) window.refreshLoginStatus();
  }catch(e){
    console.error(e);
    alert("Googleログイン失敗：" + e.code);
  }
};

window.logoutGoogle = async function(){
  await signOut(auth);
  window.currentUser = null;
  alert("ログアウトしました");
  if(window.refreshLoginStatus) window.refreshLoginStatus();
};

function getWeekKey(){
  const now = new Date();
  const japan = new Date(now.toLocaleString("en-US",{timeZone:"Asia/Tokyo"}));
  const day = japan.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(japan);
  monday.setDate(japan.getDate()+diffToMonday);
  monday.setHours(0,0,0,0);
  const y = monday.getFullYear();
  const m = String(monday.getMonth()+1).padStart(2,"0");
  const d = String(monday.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function getPlayerId(){
  if(window.currentUser) return "google_" + window.currentUser.uid;
  let playerId = localStorage.getItem("playerId");
  if(!playerId){
    playerId = crypto.randomUUID();
    localStorage.setItem("playerId",playerId);
  }
  return "local_" + playerId;
}

window.getMyPlayerId = () => getPlayerId();

window.saveWorldScore = async function(data){
  const week = getWeekKey();
  const playerId = getPlayerId();
  const docId = week + "_" + data.mode + "_" + playerId;
  const ref = doc(db,"rankings",docId);
  const old = await getDoc(ref);

  if(old.exists()){
    const oldScore = old.data().score || 0;
    if(oldScore >= data.score) return;
  }

  await setDoc(ref,{
    name:data.name,
    icon:data.icon,
    score:data.score,
    title:data.title,
    level:data.level,
    mode:data.mode,
    week:week,
    playerId:playerId,
    updatedAt:serverTimestamp()
  });
};

window.loadWorldRanking = async function(){
  const q = query(collection(db,"rankings"), where("week","==",getWeekKey()), where("mode","==","random"), limit(100));
  const snap = await getDocs(q);
  let list = [];
  snap.forEach(doc=>list.push(doc.data()));
  list.sort((a,b)=>b.score-a.score);
  return list;
};

window.savePlayerPublicData = async function(data){
  const playerId = getPlayerId();
  await setDoc(doc(db,"players",playerId),{
    playerId:playerId,
    name:data.name,
    icon:data.icon,
    title:data.title,
    level:data.level,
    bestRandomScore:data.bestRandomScore,
    updatedAt:serverTimestamp()
  });
};

window.loadFriendData = async function(friendId){
  const snap = await getDoc(doc(db,"players",friendId));
  if(!snap.exists()) return null;
  return snap.data();
};
</script>
<script src="app.js"></script>
</body>
</html>
