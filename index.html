<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>積分バトルGO</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle, #111, #000);
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h1{
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

#q{
  font-size:60px;
  margin:30px;
  text-shadow:0 0 20px #00ffcc;
}

input{
  font-size:40px;
  width:80%;
  text-align:center;
}

button{
  font-size:30px;
  margin:10px;
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  border-radius:10px;
}

#timer{
  font-size:25px;
  color:yellow;
}

#enemy, #player{
  font-size:30px;
  margin:10px;
}
</style>
</head>

<body>

<h1>積分バトルGO</h1>

<select id="difficulty">
  <option value="easy">かんたん</option>
  <option value="normal" selected>ふつう</option>
  <option value="hard">むずかしい</option>
</select>

<div id="timer"></div>

<div id="enemy">👾 敵HP: <span id="ehp">10</span></div>
<div id="player">❤️ あなたHP: <span id="php">5</span></div>

<div id="q">START</div>

<input id="ans" placeholder="答え">

<br>

<button onclick="start()">スタート</button>
<button onclick="submit()">決定</button>

<div id="result"></div>

<audio id="bgm" loop>
  <source src="bgm.mp3">
</audio>

<audio id="se_correct">
  <source src="correct.mp3">
</audio>

<audio id="se_wrong">
  <source src="wrong.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.js"></script>
<script src="app.js"></script>

</body>
</html>
